<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="head">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${pageTitle} + ' | Backoffice Iran War Info'">Backoffice</title>
    <meta name="robots" content="noindex, nofollow"/>
    <!-- Bootstrap 5 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"/>
    <!-- Admin CSS -->
    <link rel="stylesheet" th:href="@{/css/admin.css}"/>
</head>
<body>

<div th:fragment="sidebar"
     class="d-flex flex-column flex-shrink-0 bg-dark text-white p-3 admin-sidebar"
     style="width:260px;min-height:100vh;">
    <a th:href="@{/admin/dashboard}" class="d-flex align-items-center mb-3 text-white text-decoration-none">
        <i class="fas fa-newspaper me-2 text-warning fs-4"></i>
        <span class="fs-5 fw-bold">Backoffice</span>
    </a>
    <hr class="border-secondary"/>
    <ul class="nav nav-pills flex-column mb-auto">
        <li class="nav-item mb-1">
            <a th:href="@{/admin/dashboard}" class="nav-link text-white">
                <i class="fas fa-tachometer-alt me-2"></i>Tableau de bord
            </a>
        </li>
        <li class="nav-item mb-1">
            <a th:href="@{/admin/articles}" class="nav-link text-white">
                <i class="fas fa-newspaper me-2"></i>Articles
            </a>
        </li>
        <li class="nav-item mb-1">
            <a th:href="@{/admin/categories}" class="nav-link text-white">
                <i class="fas fa-folder me-2"></i>Catégories
            </a>
        </li>
        <li class="nav-item mb-1">
            <a th:href="@{/admin/auteurs}" class="nav-link text-white">
                <i class="fas fa-users me-2"></i>Auteurs
            </a>
        </li>
    </ul>
    <hr class="border-secondary"/>
    <div class="d-flex align-items-center justify-content-between mb-2">
        <div class="d-flex align-items-center text-white small">
            <i class="fas fa-user-circle me-2 text-warning fs-5"></i>
            <span sec:authentication="name">Admin</span>
        </div>
        <form th:action="@{/admin/logout}" method="post" class="d-inline">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="btn btn-sm btn-outline-secondary text-white" title="Déconnexion">
                <i class="fas fa-sign-out-alt"></i>
            </button>
        </form>
    </div>
    <a th:href="@{/}" target="_blank" class="btn btn-sm btn-outline-light">
        <i class="fas fa-external-link-alt me-1"></i>Voir le site
    </a>
</div>

</body>
</html>
