<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head}"></head>
<body class="bg-light">

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<!-- SEARCH HEADER -->
<div class="bg-dark text-white py-4">
    <div class="container">
        <h1 class="h2 fw-bold"><i class="fas fa-search me-2 text-warning"></i>Recherche</h1>
        <form th:action="@{/recherche}" method="get" class="mt-3" role="search">
            <div class="input-group input-group-lg" style="max-width:600px;">
                <input type="search" class="form-control" name="q"
                       th:value="${query}" placeholder="Rechercher dans les articles..."
                       aria-label="Terme de recherche" maxlength="200"/>
                <button class="btn btn-warning" type="submit">
                    <i class="fas fa-search me-1"></i>Rechercher
                </button>
            </div>
        </form>
    </div>
</div>

<div class="container mt-4 pb-5">
    <div class="row">
        <div class="col-lg-8">

            <!-- Results count -->
            <div th:if="${query != null and !query.isEmpty()}" class="mb-3">
                <p class="text-muted">
                    <strong th:text="${results.totalElements}">0</strong> résultat(s) pour
                    « <strong th:text="${query}">query</strong> »
                </p>
            </div>

            <!-- Results list -->
            <div th:each="article : ${results.content}" class="card border-0 shadow-sm mb-3 article-card">
                <div class="card-body">
                    <div class="mb-1">
                        <span th:if="${article.category != null}"
                              class="badge bg-warning text-dark"
                              th:text="${article.category.name}">Catégorie</span>
                    </div>
                    <h5 class="card-title mb-1">
                        <a th:href="@{'/article/' + ${article.slug}}"
                           th:text="${article.title}"
                           class="text-dark text-decoration-none">Titre</a>
                    </h5>
                    <p class="card-text text-muted small mb-2"
                       th:text="${article.summary}">Résumé</p>
                    <small class="text-muted">
                        <i class="fas fa-user me-1"></i>
                        <span th:text="${article.author != null ? article.author.name : 'Rédaction'}">Auteur</span>
                        &nbsp;·&nbsp;
                        <i class="fas fa-calendar me-1"></i>
                        <span th:if="${article.publishedAt != null}"
                              th:text="${#temporals.format(article.publishedAt, 'dd/MM/yyyy')}">Date</span>
                    </small>
                </div>
            </div>

            <!-- No results -->
            <div th:if="${results.content.isEmpty() and query != null and !query.isEmpty()}"
                 class="alert alert-warning">
                <i class="fas fa-exclamation-triangle me-2"></i>
                Aucun résultat pour « <strong th:text="${query}">query</strong> ».
                Essayez avec d'autres mots-clés.
            </div>
            <div th:if="${query == null or query.isEmpty()}" class="alert alert-info">
                <i class="fas fa-info-circle me-2"></i>
                Entrez un terme de recherche pour trouver des articles.
            </div>

            <!-- PAGINATION -->
            <nav th:if="${totalPages > 1}" class="mt-4" aria-label="Pagination">
                <ul class="pagination justify-content-center">
                    <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                        <a class="page-link"
                           th:href="@{/recherche(q=${query}, page=${currentPage - 1})}">
                            <i class="fas fa-chevron-left"></i>
                        </a>
                    </li>
                    <li th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                        class="page-item" th:classappend="${i == currentPage} ? 'active'">
                        <a class="page-link"
                           th:href="@{/recherche(q=${query}, page=${i})}"
                           th:text="${i + 1}">1</a>
                    </li>
                    <li class="page-item" th:classappend="${currentPage >= totalPages - 1} ? 'disabled'">
                        <a class="page-link"
                           th:href="@{/recherche(q=${query}, page=${currentPage + 1})}">
                            <i class="fas fa-chevron-right"></i>
                        </a>
                    </li>
                </ul>
            </nav>
        </div>

        <!-- SIDEBAR -->
        <div th:replace="~{fragments/layout :: sidebar}"></div>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
