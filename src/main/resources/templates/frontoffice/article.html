<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head}"></head>
<body class="bg-light">

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<!-- ARTICLE HEADER -->
<div class="bg-dark text-white py-4">
    <div class="container">
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb mb-2">
                <li class="breadcrumb-item">
                    <a th:href="@{/}" class="text-warning text-decoration-none">Accueil</a>
                </li>
                <li th:if="${article.category != null}" class="breadcrumb-item">
                    <a th:href="@{'/categorie/' + ${article.category.slug}}"
                       th:text="${article.category.name}"
                       class="text-warning text-decoration-none">Catégorie</a>
                </li>
                <li class="breadcrumb-item active text-light" aria-current="page"
                    th:text="${article.title}">Titre</li>
            </ol>
        </nav>
        <h1 class="h2 fw-bold" th:text="${article.title}">Titre de l'article</h1>
        <div class="mt-2 text-light opacity-75">
            <span class="badge bg-warning text-dark me-2"
                  th:if="${article.category != null}"
                  th:text="${article.category.name}">Catégorie</span>
            <small>
                <i class="fas fa-user me-1"></i>
                <span th:text="${article.author != null ? article.author.name : 'Rédaction'}">Auteur</span>
                &nbsp;·&nbsp;
                <i class="fas fa-calendar me-1"></i>
                <span th:if="${article.publishedAt != null}"
                      th:text="${#temporals.format(article.publishedAt, 'dd MMMM yyyy', #locale)}">Date</span>
                &nbsp;·&nbsp;
                <i class="fas fa-eye me-1"></i>
                <span th:text="${article.viewCount}">0</span> vues
            </small>
        </div>
    </div>
</div>

<div class="container mt-4 pb-5">
    <div class="row">
        <!-- ARTICLE CONTENT -->
        <div class="col-lg-8">
            <article>
                <!-- Featured image -->
                <img th:if="${article.imageUrl != null}" th:src="${article.imageUrl}"
                     class="img-fluid rounded mb-4 w-100"
                     th:alt="${article.title}"
                     style="max-height:400px;object-fit:cover;"/>

                <!-- Summary / lead -->
                <p th:if="${article.summary != null}"
                   class="lead text-muted border-start border-warning ps-3 mb-4"
                   th:text="${article.summary}">Résumé</p>

                <!-- Article body -->
                <div class="article-content" th:utext="${article.content}">
                    Contenu de l'article
                </div>

                <!-- Tags -->
                <div th:if="${!#lists.isEmpty(article.tags)}" class="mt-4">
                    <strong><i class="fas fa-tags me-2 text-warning"></i>Tags :</strong>
                    <span th:each="tag : ${article.tags}"
                          class="badge bg-secondary me-1" th:text="${tag}">tag</span>
                </div>

                <!-- Author bio -->
                <div th:if="${article.author != null and article.author.bio != null}"
                     class="card border-0 bg-light mt-4">
                    <div class="card-body">
                        <h6 class="fw-bold mb-1">
                            <i class="fas fa-user-circle me-2 text-warning"></i>
                            <span th:text="${article.author.name}">Auteur</span>
                        </h6>
                        <p class="text-muted small mb-0" th:text="${article.author.bio}">Bio</p>
                    </div>
                </div>

                <!-- Share -->
                <div class="mt-4 d-flex gap-2 align-items-center flex-wrap">
                    <strong class="me-2"><i class="fas fa-share-alt me-1"></i>Partager :</strong>
                    <a th:href="'https://twitter.com/intent/tweet?url=' + ${canonicalUrl} + '&text=' + ${article.title}"
                       target="_blank" rel="noopener noreferrer" class="btn btn-sm btn-outline-secondary">
                        <i class="fab fa-twitter me-1"></i>Twitter
                    </a>
                    <a th:href="'https://www.facebook.com/sharer/sharer.php?u=' + ${canonicalUrl}"
                       target="_blank" rel="noopener noreferrer" class="btn btn-sm btn-outline-secondary">
                        <i class="fab fa-facebook me-1"></i>Facebook
                    </a>
                    <a th:href="'https://www.linkedin.com/sharing/share-offsite/?url=' + ${canonicalUrl}"
                       target="_blank" rel="noopener noreferrer" class="btn btn-sm btn-outline-secondary">
                        <i class="fab fa-linkedin me-1"></i>LinkedIn
                    </a>
                </div>

                <!-- Navigation -->
                <div class="mt-4 d-flex justify-content-between flex-wrap gap-2">
                    <a th:href="@{/}" class="btn btn-outline-dark">
                        <i class="fas fa-arrow-left me-1"></i>Retour à l'accueil
                    </a>
                    <a th:if="${article.category != null}"
                       th:href="@{'/categorie/' + ${article.category.slug}}"
                       class="btn btn-outline-warning">
                        <i class="fas fa-folder me-1"></i>
                        Voir plus dans <span th:text="${article.category.name}">Catégorie</span>
                    </a>
                </div>
            </article>
        </div>

        <!-- SIDEBAR -->
        <div th:replace="~{fragments/layout :: sidebar}"></div>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
