<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head}"></head>
<body class="bg-light">

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<!-- HERO -->
<section class="hero-section bg-dark text-white py-5">
    <div class="container">
        <div class="row align-items-center">
            <div class="col-lg-8">
                <h1 class="display-5 fw-bold">
                    <i class="fas fa-globe-asia me-2 text-warning"></i>
                    Iran War Info
                </h1>
                <p class="lead text-light opacity-75">
                    Suivez en temps réel l'actualité du conflit en Iran : reportages, analyses géopolitiques
                    et informations humanitaires.
                </p>
                <a th:href="@{/recherche}" class="btn btn-warning me-2">
                    <i class="fas fa-search me-1"></i>Rechercher
                </a>
            </div>
        </div>
    </div>
</section>

<!-- CATEGORIES BAND -->
<div class="bg-warning text-dark py-2">
    <div class="container d-flex flex-wrap gap-2 align-items-center">
        <strong class="me-3"><i class="fas fa-tag me-1"></i>RUBRIQUES :</strong>
        <a th:each="cat : ${categories}"
           th:href="@{'/categorie/' + ${cat.slug}}"
           th:text="${cat.name}"
           class="badge bg-dark text-white text-decoration-none px-2 py-1">Cat</a>
    </div>
</div>

<div class="container mt-4 pb-5">
    <div class="row">
        <!-- MAIN ARTICLES -->
        <div class="col-lg-8">
            <h2 class="h4 mb-3 border-bottom pb-2">
                <i class="fas fa-newspaper me-2 text-danger"></i>Dernières actualités
            </h2>

            <div class="row g-4">
                <div class="col-md-6" th:each="article : ${articles.content}">
                    <div class="card h-100 shadow-sm article-card border-0">
                        <div class="article-img-placeholder d-flex align-items-center justify-content-center bg-secondary"
                             th:if="${article.imageUrl == null}" style="height:180px;">
                            <i class="fas fa-newspaper fa-3x text-white opacity-50"></i>
                        </div>
                        <img th:if="${article.imageUrl != null}" th:src="${article.imageUrl}"
                             class="card-img-top" th:alt="${article.title}"
                             style="height:180px;object-fit:cover;"/>
                        <div class="card-body d-flex flex-column">
                            <div class="mb-2">
                                <span th:if="${article.category != null}"
                                      class="badge bg-warning text-dark"
                                      th:text="${article.category.name}">Catégorie</span>
                            </div>
                            <h5 class="card-title fw-bold">
                                <a th:href="@{'/article/' + ${article.slug}}"
                                   th:text="${article.title}"
                                   class="text-dark text-decoration-none stretched-link">Titre</a>
                            </h5>
                            <p class="card-text text-muted small flex-grow-1"
                               th:text="${article.summary}">Résumé</p>
                            <div class="mt-2">
                                <small class="text-muted">
                                    <i class="fas fa-user me-1"></i>
                                    <span th:text="${article.author != null ? article.author.name : 'Rédaction'}">Auteur</span>
                                    &nbsp;·&nbsp;
                                    <i class="fas fa-calendar me-1"></i>
                                    <span th:if="${article.publishedAt != null}"
                                          th:text="${#temporals.format(article.publishedAt, 'dd/MM/yyyy')}">Date</span>
                                    &nbsp;·&nbsp;
                                    <i class="fas fa-eye me-1"></i>
                                    <span th:text="${article.viewCount}">0</span>
                                </small>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- No articles -->
            <div th:if="${articles.content.isEmpty()}" class="alert alert-info mt-3">
                <i class="fas fa-info-circle me-2"></i>Aucun article disponible pour le moment.
            </div>

            <!-- PAGINATION -->
            <nav th:if="${totalPages > 1}" class="mt-4" aria-label="Pagination des articles">
                <ul class="pagination justify-content-center">
                    <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                        <a class="page-link" th:href="@{/?page=${currentPage - 1}}">
                            <i class="fas fa-chevron-left"></i>
                        </a>
                    </li>
                    <li th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                        class="page-item" th:classappend="${i == currentPage} ? 'active'">
                        <a class="page-link" th:href="@{/?page=${i}}" th:text="${i + 1}">1</a>
                    </li>
                    <li class="page-item" th:classappend="${currentPage >= totalPages - 1} ? 'disabled'">
                        <a class="page-link" th:href="@{/?page=${currentPage + 1}}">
                            <i class="fas fa-chevron-right"></i>
                        </a>
                    </li>
                </ul>
            </nav>
        </div>

        <!-- SIDEBAR -->
        <div th:replace="~{fragments/layout :: sidebar}"></div>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
