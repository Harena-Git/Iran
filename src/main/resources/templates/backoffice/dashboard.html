<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/admin-layout :: head}"></head>
<body class="bg-light">
<div class="d-flex">
    <div th:replace="~{fragments/admin-layout :: sidebar}"></div>

    <main class="flex-grow-1 p-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="h3 mb-0 fw-bold">
                <i class="fas fa-tachometer-alt me-2 text-warning"></i>Tableau de bord
            </h1>
            <a th:href="@{/admin/articles/nouveau}" class="btn btn-warning">
                <i class="fas fa-plus me-1"></i>Nouvel article
            </a>
        </div>

        <!-- Stats cards -->
        <div class="row g-4 mb-4">
            <div class="col-md-4">
                <div class="card border-0 shadow-sm text-white bg-dark h-100">
                    <div class="card-body d-flex align-items-center">
                        <i class="fas fa-newspaper fa-3x text-warning me-3"></i>
                        <div>
                            <div class="fs-2 fw-bold" th:text="${totalArticles}">0</div>
                            <div class="small text-muted">Articles au total</div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card border-0 shadow-sm text-white bg-success h-100">
                    <div class="card-body d-flex align-items-center">
                        <i class="fas fa-check-circle fa-3x text-white opacity-75 me-3"></i>
                        <div>
                            <div class="fs-2 fw-bold" th:text="${publishedArticles}">0</div>
                            <div class="small text-white opacity-75">Articles publiés</div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card border-0 shadow-sm text-white bg-secondary h-100">
                    <div class="card-body d-flex align-items-center">
                        <i class="fas fa-edit fa-3x text-white opacity-75 me-3"></i>
                        <div>
                            <div class="fs-2 fw-bold" th:text="${draftArticles}">0</div>
                            <div class="small text-white opacity-75">Brouillons</div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card border-0 shadow-sm h-100">
                    <div class="card-body d-flex align-items-center">
                        <i class="fas fa-folder fa-3x text-warning me-3"></i>
                        <div>
                            <div class="fs-2 fw-bold" th:text="${totalCategories}">0</div>
                            <div class="small text-muted">Catégories</div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card border-0 shadow-sm h-100">
                    <div class="card-body d-flex align-items-center">
                        <i class="fas fa-users fa-3x text-warning me-3"></i>
                        <div>
                            <div class="fs-2 fw-bold" th:text="${totalAuthors}">0</div>
                            <div class="small text-muted">Auteurs</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Latest articles table -->
        <div class="card border-0 shadow-sm">
            <div class="card-header bg-white d-flex justify-content-between align-items-center">
                <h5 class="mb-0 fw-bold">
                    <i class="fas fa-clock me-2 text-warning"></i>Derniers articles
                </h5>
                <a th:href="@{/admin/articles}" class="btn btn-sm btn-outline-dark">Voir tous</a>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>Titre</th>
                                <th>Catégorie</th>
                                <th>Statut</th>
                                <th>Date</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="article : ${latestArticles}">
                                <td class="fw-semibold" th:text="${article.title}">Titre</td>
                                <td>
                                    <span th:if="${article.category != null}"
                                          class="badge bg-warning text-dark"
                                          th:text="${article.category.name}">Cat</span>
                                    <span th:if="${article.category == null}" class="text-muted">—</span>
                                </td>
                                <td>
                                    <span th:if="${article.status.name() == 'PUBLISHED'}"
                                          class="badge bg-success">Publié</span>
                                    <span th:if="${article.status.name() == 'DRAFT'}"
                                          class="badge bg-secondary">Brouillon</span>
                                    <span th:if="${article.status.name() == 'ARCHIVED'}"
                                          class="badge bg-dark">Archivé</span>
                                </td>
                                <td>
                                    <small th:if="${article.publishedAt != null}"
                                           th:text="${#temporals.format(article.publishedAt, 'dd/MM/yyyy')}">Date</small>
                                </td>
                                <td>
                                    <a th:href="@{'/admin/articles/modifier/' + ${article.id}}"
                                       class="btn btn-sm btn-outline-primary">
                                        <i class="fas fa-edit"></i>
                                    </a>
                                    <a th:if="${article.status.name() == 'PUBLISHED'}"
                                       th:href="@{'/article/' + ${article.slug}}"
                                       target="_blank" class="btn btn-sm btn-outline-secondary ms-1">
                                        <i class="fas fa-eye"></i>
                                    </a>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(latestArticles)}">
                                <td colspan="5" class="text-center text-muted py-3">
                                    Aucun article pour le moment.
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
