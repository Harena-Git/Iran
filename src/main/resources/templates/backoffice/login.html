<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Connexion | Backoffice Iran War Info</title>
    <meta name="robots" content="noindex, nofollow"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"/>
    <link rel="stylesheet" th:href="@{/css/admin.css}"/>
</head>
<body class="bg-dark d-flex align-items-center justify-content-center" style="min-height:100vh;">

<div class="card shadow-lg" style="width:100%;max-width:400px;">
    <div class="card-header bg-dark text-white text-center py-4">
        <i class="fas fa-newspaper fa-3x text-warning mb-2"></i>
        <h4 class="mb-0 fw-bold">Iran War Info</h4>
        <small class="text-muted">Backoffice administration</small>
    </div>
    <div class="card-body p-4">
        <!-- Error alert -->
        <div th:if="${param.error}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <i class="fas fa-exclamation-triangle me-2"></i>
            Identifiant ou mot de passe incorrect.
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <!-- Logout alert -->
        <div th:if="${param.logout}" class="alert alert-success alert-dismissible fade show" role="alert">
            <i class="fas fa-check-circle me-2"></i>
            Vous avez été déconnecté avec succès.
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <form th:action="@{/admin/login}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <div class="mb-3">
                <label for="username" class="form-label fw-semibold">
                    <i class="fas fa-user me-1 text-warning"></i>Identifiant
                </label>
                <input type="text" class="form-control" id="username" name="username"
                       placeholder="Entrez votre identifiant" required autofocus/>
            </div>
            <div class="mb-4">
                <label for="password" class="form-label fw-semibold">
                    <i class="fas fa-lock me-1 text-warning"></i>Mot de passe
                </label>
                <input type="password" class="form-control" id="password" name="password"
                       placeholder="Entrez votre mot de passe" required/>
            </div>
            <button type="submit" class="btn btn-warning w-100 fw-bold">
                <i class="fas fa-sign-in-alt me-2"></i>Se connecter
            </button>
        </form>
    </div>
    <div class="card-footer text-center text-muted small py-3">
        <a th:href="@{/}" class="text-muted text-decoration-none">
            <i class="fas fa-arrow-left me-1"></i>Retour au site
        </a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
