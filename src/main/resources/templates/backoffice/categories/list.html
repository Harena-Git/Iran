<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/admin-layout :: head}"></head>
<body class="bg-light">
<div class="d-flex">
    <div th:replace="~{fragments/admin-layout :: sidebar}"></div>

    <main class="flex-grow-1 p-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="h3 mb-0 fw-bold">
                <i class="fas fa-folder me-2 text-warning"></i>Catégories
            </h1>
            <a th:href="@{/admin/categories/nouvelle}" class="btn btn-warning">
                <i class="fas fa-plus me-1"></i>Nouvelle catégorie
            </a>
        </div>

        <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
            <i class="fas fa-check-circle me-2"></i><span th:text="${success}">Succès</span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div class="card border-0 shadow-sm">
            <div class="card-body p-0">
                <table class="table table-hover mb-0 align-middle">
                    <thead class="table-dark">
                        <tr>
                            <th>#</th>
                            <th>Nom</th>
                            <th>Slug</th>
                            <th>Description</th>
                            <th>Articles</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="cat : ${categories}">
                            <td class="text-muted small" th:text="${cat.id}">1</td>
                            <td class="fw-semibold" th:text="${cat.name}">Nom</td>
                            <td><code th:text="${cat.slug}">slug</code></td>
                            <td class="small text-muted"
                                th:text="${cat.description != null ? cat.description : '—'}">Description</td>
                            <td><span class="badge bg-secondary" th:text="${cat.articleCount}">0</span></td>
                            <td>
                                <div class="btn-group" role="group">
                                    <a th:href="@{'/admin/categories/modifier/' + ${cat.id}}"
                                       class="btn btn-sm btn-outline-primary">
                                        <i class="fas fa-edit"></i>
                                    </a>
                                    <a th:href="@{'/categorie/' + ${cat.slug}}"
                                       target="_blank" class="btn btn-sm btn-outline-secondary">
                                        <i class="fas fa-eye"></i>
                                    </a>
                                    <form th:action="@{'/admin/categories/supprimer/' + ${cat.id}}"
                                          method="post" class="d-inline"
                                          onsubmit="return confirm('Supprimer cette catégorie ?')">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                        <button type="submit" class="btn btn-sm btn-outline-danger">
                                            <i class="fas fa-trash"></i>
                                        </button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(categories)}">
                            <td colspan="6" class="text-center text-muted py-4">
                                <i class="fas fa-info-circle me-2"></i>Aucune catégorie.
                                <a th:href="@{/admin/categories/nouvelle}">Créer la première.</a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
