<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/admin-layout :: head}"></head>
<body class="bg-light">
<div class="d-flex">
    <div th:replace="~{fragments/admin-layout :: sidebar}"></div>

    <main class="flex-grow-1 p-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="h3 mb-0 fw-bold">
                <i class="fas fa-folder me-2 text-warning"></i>
                <span th:text="${category.id == null} ? 'Nouvelle catégorie' : 'Modifier la catégorie'">Catégorie</span>
            </h1>
            <a th:href="@{/admin/categories}" class="btn btn-outline-dark">
                <i class="fas fa-arrow-left me-1"></i>Retour
            </a>
        </div>

        <div class="card border-0 shadow-sm" style="max-width:600px;">
            <div class="card-body">
                <form th:action="@{/admin/categories/sauvegarder}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <input type="hidden" name="id" th:value="${category.id}"/>
                    <div class="mb-3">
                        <label for="name" class="form-label fw-semibold">
                            Nom <span class="text-danger">*</span>
                        </label>
                        <input type="text" class="form-control" id="name" name="name"
                               th:value="${category.name}" required maxlength="200"
                               placeholder="Nom de la catégorie"/>
                    </div>
                    <div class="mb-3">
                        <label for="slug" class="form-label fw-semibold">Slug</label>
                        <input type="text" class="form-control" id="slug" name="slug"
                               th:value="${category.slug}" maxlength="200"
                               placeholder="slug-url (auto-généré si vide)"/>
                        <div class="form-text">Laissez vide pour générer automatiquement.</div>
                    </div>
                    <div class="mb-4">
                        <label for="description" class="form-label fw-semibold">Description</label>
                        <textarea class="form-control" id="description" name="description"
                                  rows="3" maxlength="500" placeholder="Description de la catégorie"
                                  th:text="${category.description}"></textarea>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-warning fw-bold">
                            <i class="fas fa-save me-2"></i>Sauvegarder
                        </button>
                        <a th:href="@{/admin/categories}" class="btn btn-outline-dark">
                            <i class="fas fa-times me-1"></i>Annuler
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
