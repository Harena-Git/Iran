<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/admin-layout :: head}"></head>
<body class="bg-light">
<div class="d-flex">
    <div th:replace="~{fragments/admin-layout :: sidebar}"></div>

    <main class="flex-grow-1 p-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="h3 mb-0 fw-bold">
                <i class="fas fa-users me-2 text-warning"></i>Auteurs
            </h1>
            <a th:href="@{/admin/auteurs/nouveau}" class="btn btn-warning">
                <i class="fas fa-plus me-1"></i>Nouvel auteur
            </a>
        </div>

        <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
            <i class="fas fa-check-circle me-2"></i><span th:text="${success}">Succès</span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div class="row g-4">
            <div th:each="author : ${authors}" class="col-md-6 col-lg-4">
                <div class="card border-0 shadow-sm h-100">
                    <div class="card-body">
                        <div class="d-flex align-items-center mb-3">
                            <div class="rounded-circle bg-warning d-flex align-items-center justify-content-center me-3"
                                 style="width:48px;height:48px;flex-shrink:0;">
                                <i class="fas fa-user text-dark fs-5"></i>
                            </div>
                            <div>
                                <h5 class="mb-0 fw-bold" th:text="${author.name}">Nom</h5>
                                <small class="text-muted" th:text="${author.email}">email</small>
                            </div>
                        </div>
                        <p th:if="${author.bio != null}" class="text-muted small mb-3"
                           th:text="${author.bio}">Bio</p>
                        <div class="d-flex gap-2">
                            <a th:href="@{'/admin/auteurs/modifier/' + ${author.id}}"
                               class="btn btn-sm btn-outline-primary">
                                <i class="fas fa-edit me-1"></i>Modifier
                            </a>
                            <form th:action="@{'/admin/auteurs/supprimer/' + ${author.id}}"
                                  method="post" class="d-inline"
                                  onsubmit="return confirm('Supprimer cet auteur ?')">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                <button type="submit" class="btn btn-sm btn-outline-danger">
                                    <i class="fas fa-trash me-1"></i>Supprimer
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
            <div th:if="${#lists.isEmpty(authors)}" class="col-12">
                <div class="alert alert-info">
                    <i class="fas fa-info-circle me-2"></i>Aucun auteur.
                    <a th:href="@{/admin/auteurs/nouveau}">Créer le premier auteur.</a>
                </div>
            </div>
        </div>
    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
