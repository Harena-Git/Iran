<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/admin-layout :: head}"></head>
<body class="bg-light">
<div class="d-flex">
    <div th:replace="~{fragments/admin-layout :: sidebar}"></div>

    <main class="flex-grow-1 p-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="h3 mb-0 fw-bold">
                <i class="fas fa-newspaper me-2 text-warning"></i>Articles
            </h1>
            <a th:href="@{/admin/articles/nouveau}" class="btn btn-warning">
                <i class="fas fa-plus me-1"></i>Nouvel article
            </a>
        </div>

        <!-- Flash messages -->
        <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
            <i class="fas fa-check-circle me-2"></i><span th:text="${success}">Succès</span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div class="card border-0 shadow-sm">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover mb-0 align-middle">
                        <thead class="table-dark">
                            <tr>
                                <th>#</th>
                                <th>Titre</th>
                                <th>Catégorie</th>
                                <th>Auteur</th>
                                <th>Statut</th>
                                <th>Vues</th>
                                <th>Date</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="article : ${articles.content}">
                                <td class="text-muted small" th:text="${article.id}">1</td>
                                <td><span class="fw-semibold" th:text="${article.title}">Titre</span></td>
                                <td>
                                    <span th:if="${article.category != null}"
                                          class="badge bg-warning text-dark"
                                          th:text="${article.category.name}">Cat</span>
                                </td>
                                <td class="small"
                                    th:text="${article.author != null ? article.author.name : '—'}">Auteur</td>
                                <td>
                                    <span th:if="${article.status.name() == 'PUBLISHED'}"
                                          class="badge bg-success">Publié</span>
                                    <span th:if="${article.status.name() == 'DRAFT'}"
                                          class="badge bg-secondary">Brouillon</span>
                                    <span th:if="${article.status.name() == 'ARCHIVED'}"
                                          class="badge bg-dark">Archivé</span>
                                </td>
                                <td class="small text-muted" th:text="${article.viewCount}">0</td>
                                <td class="small">
                                    <span th:if="${article.publishedAt != null}"
                                          th:text="${#temporals.format(article.publishedAt, 'dd/MM/yy')}">Date</span>
                                </td>
                                <td>
                                    <div class="btn-group" role="group">
                                        <a th:href="@{'/admin/articles/modifier/' + ${article.id}}"
                                           class="btn btn-sm btn-outline-primary" title="Modifier">
                                            <i class="fas fa-edit"></i>
                                        </a>
                                        <th:block th:if="${article.status.name() != 'PUBLISHED'}">
                                        <form th:action="@{'/admin/articles/publier/' + ${article.id}}"
                                              method="post" class="d-inline">
                                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                            <button type="submit" class="btn btn-sm btn-outline-success" title="Publier">
                                                <i class="fas fa-check"></i>
                                            </button>
                                        </form>
                                        </th:block>
                                        <a th:if="${article.status.name() == 'PUBLISHED'}"
                                           th:href="@{'/article/' + ${article.slug}}"
                                           target="_blank" class="btn btn-sm btn-outline-secondary" title="Voir">
                                            <i class="fas fa-eye"></i>
                                        </a>
                                        <form th:action="@{'/admin/articles/supprimer/' + ${article.id}}"
                                              method="post" class="d-inline"
                                              onsubmit="return confirm('Supprimer cet article ?')">
                                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                            <button type="submit" class="btn btn-sm btn-outline-danger" title="Supprimer">
                                                <i class="fas fa-trash"></i>
                                            </button>
                                        </form>
                                    </div>
                                </td>
                            </tr>
                            <tr th:if="${articles.content.isEmpty()}">
                                <td colspan="8" class="text-center text-muted py-4">
                                    <i class="fas fa-info-circle me-2"></i>Aucun article pour le moment.
                                    <a th:href="@{/admin/articles/nouveau}">Créer le premier article.</a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Pagination -->
        <nav th:if="${totalPages > 1}" class="mt-4" aria-label="Pagination">
            <ul class="pagination justify-content-center">
                <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                    <a class="page-link" th:href="@{/admin/articles(page=${currentPage - 1})}">Précédent</a>
                </li>
                <li th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                    class="page-item" th:classappend="${i == currentPage} ? 'active'">
                    <a class="page-link" th:href="@{/admin/articles(page=${i})}" th:text="${i + 1}">1</a>
                </li>
                <li class="page-item" th:classappend="${currentPage >= totalPages - 1} ? 'disabled'">
                    <a class="page-link" th:href="@{/admin/articles(page=${currentPage + 1})}">Suivant</a>
                </li>
            </ul>
        </nav>
    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
