<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/admin-layout :: head}"></head>
<body class="bg-light">
<div class="d-flex">
    <div th:replace="~{fragments/admin-layout :: sidebar}"></div>

    <main class="flex-grow-1 p-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="h3 mb-0 fw-bold">
                <i class="fas fa-edit me-2 text-warning"></i>
                <span th:text="${article.id == null} ? 'Nouvel article' : 'Modifier l\'article'">Article</span>
            </h1>
            <a th:href="@{/admin/articles}" class="btn btn-outline-dark">
                <i class="fas fa-arrow-left me-1"></i>Retour
            </a>
        </div>

        <form th:action="@{/admin/articles/sauvegarder}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <input type="hidden" name="id" th:value="${article.id}"/>
            <input type="hidden" name="slug" th:value="${article.slug}"/>
            <input type="hidden" name="publishedAt" th:value="${article.publishedAt}"/>
            <input type="hidden" name="viewCount" th:value="${article.viewCount}"/>

            <div class="row">
                <!-- Main content -->
                <div class="col-lg-8">
                    <div class="card border-0 shadow-sm mb-4">
                        <div class="card-body">
                            <div class="mb-3">
                                <label for="title" class="form-label fw-semibold">
                                    Titre <span class="text-danger">*</span>
                                </label>
                                <input type="text" class="form-control" id="title" name="title"
                                       th:value="${article.title}"
                                       placeholder="Titre de l'article" required maxlength="500"/>
                            </div>
                            <div class="mb-3">
                                <label for="summary" class="form-label fw-semibold">Résumé</label>
                                <textarea class="form-control" id="summary" name="summary"
                                          rows="3" placeholder="Résumé de l'article" maxlength="1000"
                                          th:text="${article.summary}"></textarea>
                            </div>
                            <div class="mb-3">
                                <label for="content" class="form-label fw-semibold">
                                    Contenu <span class="text-danger">*</span>
                                </label>
                                <textarea class="form-control" id="content" name="content"
                                          rows="20" placeholder="Contenu de l'article (HTML autorisé)"
                                          required th:text="${article.content}"></textarea>
                                <div class="form-text">Vous pouvez utiliser des balises HTML pour la mise en forme.</div>
                            </div>
                        </div>
                    </div>

                    <!-- SEO -->
                    <div class="card border-0 shadow-sm mb-4">
                        <div class="card-header bg-white">
                            <h5 class="mb-0 fw-bold">
                                <i class="fas fa-search me-2 text-warning"></i>SEO / Référencement
                            </h5>
                        </div>
                        <div class="card-body">
                            <div class="mb-3">
                                <label for="metaTitle" class="form-label fw-semibold">Titre SEO</label>
                                <input type="text" class="form-control" id="metaTitle" name="metaTitle"
                                       th:value="${article.metaTitle}"
                                       placeholder="Titre pour les moteurs de recherche" maxlength="200"/>
                                <div class="form-text">Si vide, le titre de l'article sera utilisé.</div>
                            </div>
                            <div class="mb-3">
                                <label for="metaDescription" class="form-label fw-semibold">Méta-description</label>
                                <textarea class="form-control" id="metaDescription" name="metaDescription"
                                          rows="2" placeholder="Description SEO (150-160 caractères)" maxlength="500"
                                          th:text="${article.metaDescription}"></textarea>
                            </div>
                            <div class="mb-3">
                                <label for="metaKeywords" class="form-label fw-semibold">Mots-clés</label>
                                <input type="text" class="form-control" id="metaKeywords" name="metaKeywords"
                                       th:value="${article.metaKeywords}"
                                       placeholder="mots-clés séparés par des virgules" maxlength="500"/>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Sidebar options -->
                <div class="col-lg-4">
                    <div class="card border-0 shadow-sm mb-4">
                        <div class="card-header bg-white">
                            <h5 class="mb-0 fw-bold">Publication</h5>
                        </div>
                        <div class="card-body">
                            <div class="mb-3">
                                <label for="status" class="form-label fw-semibold">Statut</label>
                                <select class="form-select" id="status" name="status">
                                    <option th:each="s : ${statuses}"
                                            th:value="${s.name()}"
                                            th:text="${s.name() == 'PUBLISHED' ? 'Publié' : (s.name() == 'DRAFT' ? 'Brouillon' : 'Archivé')}"
                                            th:selected="${article.status != null and article.status == s}">
                                        Statut
                                    </option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label for="categoryId" class="form-label fw-semibold">Catégorie</label>
                                <select class="form-select" id="categoryId" name="categoryId">
                                    <option value="">— Aucune catégorie —</option>
                                    <option th:each="cat : ${categories}"
                                            th:value="${cat.id}"
                                            th:text="${cat.name}"
                                            th:selected="${article.category != null and article.category.id == cat.id}">
                                        Catégorie
                                    </option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label for="authorId" class="form-label fw-semibold">Auteur</label>
                                <select class="form-select" id="authorId" name="authorId">
                                    <option value="">— Aucun auteur —</option>
                                    <option th:each="auth : ${authors}"
                                            th:value="${auth.id}"
                                            th:text="${auth.name}"
                                            th:selected="${article.author != null and article.author.id == auth.id}">
                                        Auteur
                                    </option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="card border-0 shadow-sm mb-4">
                        <div class="card-header bg-white">
                            <h5 class="mb-0 fw-bold">Tags &amp; Image</h5>
                        </div>
                        <div class="card-body">
                            <div class="mb-3">
                                <label for="tagsInput" class="form-label fw-semibold">Tags</label>
                                <input type="text" class="form-control" id="tagsInput" name="tagsInput"
                                       th:value="${tagsAsString}"
                                       placeholder="tag1, tag2, tag3"/>
                                <div class="form-text">Séparez les tags par des virgules.</div>
                            </div>
                            <div class="mb-3">
                                <label for="imageUrl" class="form-label fw-semibold">URL de l'image</label>
                                <input type="url" class="form-control" id="imageUrl" name="imageUrl"
                                       th:value="${article.imageUrl}"
                                       placeholder="https://example.com/image.jpg"/>
                            </div>
                        </div>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-warning fw-bold">
                            <i class="fas fa-save me-2"></i>Sauvegarder
                        </button>
                        <a th:href="@{/admin/articles}" class="btn btn-outline-dark">
                            <i class="fas fa-times me-1"></i>Annuler
                        </a>
                    </div>
                </div>
            </div>
        </form>
    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
